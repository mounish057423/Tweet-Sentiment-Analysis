version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: sentiment-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./Front-end
    container_name: sentiment-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend